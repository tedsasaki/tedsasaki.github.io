<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GLA America — Village App Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #ede8dc;
    --ink: #0f0d08;
    --ink-mid: #2e2a1e;
    --ink-soft: #3a3020;
    --gold: #7a5c08;
    --gold-light: #e8d090;
    --border: rgba(15,13,8,0.30);
    --border-strong: rgba(15,13,8,0.45);
  }

  html, body {
    height: 100%;
    background: var(--cream);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--ink);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(184,147,42,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(184,147,42,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .page-wrap {
    width: 100%;
    max-width: 480px;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header / Title area */
  .app-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .app-emblem {
    width: 56px;
    height: 56px;
    margin: 0 auto 1.25rem;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--gold);
    animation: fadeUp 0.7s ease 0.1s both;
  }

  .app-title-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    animation: fadeUp 0.7s ease 0.15s both;
  }

  .app-title-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.25;
    margin-bottom: 10px;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .app-subtitle {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadeUp 0.7s ease 0.25s both;
  }

  .app-subtitle span {
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.5;
  }

  .app-subtitle .jp {
    font-family: 'Noto Serif JP', serif;
    font-style: normal;
    font-size: 13px;
    color: var(--gold);
    font-weight: 500;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    animation: fadeUp 0.7s ease 0.3s both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border-strong);
  }
  .divider-text {
    font-family: 'Inconsolata', monospace;
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Sign-in card */
  .signin-card {
    background: #fff;
    border: 0.5px solid var(--border-strong);
    border-radius: 12px;
    padding: 2rem 2rem 1.75rem;
    animation: fadeUp 0.7s ease 0.35s both;
  }

  .field-group {
    margin-bottom: 1.25rem;
  }

  .field-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 7px;
  }

  .field-label .jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--gold);
    font-weight: 500;
  }

  .field-label .en {
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    font-family: 'Inconsolata', monospace;
    font-size: 15px;
    padding: 10px 13px;
    border: 0.5px solid var(--border-strong);
    border-radius: 6px;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="email"]:focus,
  input[type="password"]:focus {
    border-color: var(--gold);
    background: #fff;
  }

  .signin-btn {
    width: 100%;
    margin-top: 0.5rem;
    padding: 12px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: opacity 0.2s, transform 0.15s;
  }

  .signin-btn:hover { opacity: 0.88; }
  .signin-btn:active { transform: scale(0.99); }
  .signin-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .signin-btn .btn-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    font-weight: 400;
    opacity: 0.75;
  }

  .signin-btn .btn-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  /* Error / status message */
  .status-msg {
    margin-top: 1rem;
    padding: 10px 13px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Inconsolata', monospace;
    display: none;
  }

  .status-msg.error {
    display: block;
    background: #fdf0ef;
    border: 0.5px solid rgba(180,50,40,0.25);
    color: #a83228;
  }

  .status-msg.success {
    display: block;
    background: var(--gold-light);
    border: 0.5px solid rgba(184,147,42,0.3);
    color: #7a5e10;
  }

  /* Footer note */
  .footer-note {
    text-align: center;
    margin-top: 1.5rem;
    animation: fadeUp 0.7s ease 0.45s both;
  }

  .footer-note .jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--gold);
    display: block;
    margin-bottom: 2px;
    font-weight: 500;
  }

  .footer-note .en {
    font-size: 13px;
    font-style: italic;
    color: var(--ink-soft);
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="app-header">
    <div class="app-emblem">&#9678;</div>

    <div class="app-title-jp">あなたの場所に100人の村をつくろう</div>
    <div class="app-title-en">Let's Build a Village with<br>100 Members Where You Are</div>

    <div class="app-subtitle">
      <span class="jp">GLA America 同伴者アプリ</span>
      <span class="en">GLA America — Support Member App</span>
    </div>
  </div>

  <div class="divider">
    <span class="divider-text">サインイン / Sign In</span>
  </div>

  <div class="signin-card">

    <div class="field-group">
      <div class="field-label">
        <span class="jp">メールアドレス</span>
        <span class="en">Email Address</span>
      </div>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
    </div>

    <div class="field-group">
      <div class="field-label">
        <span class="jp">パスワード</span>
        <span class="en">Password</span>
      </div>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="signin-btn" id="signin-btn" onclick="handleSignIn()">
      <span class="btn-jp">サインイン</span>
      <span class="btn-en">Sign In</span>
    </button>

    <div class="status-msg" id="status-msg"></div>

  </div>

  <div class="footer-note">
    <span class="jp">アカウントは管理者によって作成されます</span>
    <span class="en">Accounts are created by an Administrator</span>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvMbnCM7P4Wwg8ZBA8z3sxARO6EMtYNEs",
    authDomain: "gla-america-village.firebaseapp.com",
    projectId: "gla-america-village",
    storageBucket: "gla-america-village.firebasestorage.app",
    messagingSenderId: "482648560227",
    appId: "1:482648560227:web:b614f019ca5d66904d5e56"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.handleSignIn = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signin-btn');
    const msg = document.getElementById('status-msg');

    msg.className = 'status-msg';
    msg.style.display = 'none';

    if (!email || !password) {
      msg.className = 'status-msg error';
      msg.textContent = 'メールアドレスとパスワードを入力してください / Please enter your email and password.';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span><span class="btn-en">Signing in...</span>';

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'index.html';
    } catch (error) {
      let errText = 'サインインに失敗しました / Sign-in failed. Please check your email and password.';
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
        errText = 'メールアドレスまたはパスワードが正しくありません / Incorrect email or password.';
      } else if (error.code === 'auth/user-not-found') {
        errText = 'このメールアドレスは登録されていません / No account found for this email.';
      } else if (error.code === 'auth/too-many-requests') {
        errText = 'ログイン試行が多すぎます / Too many attempts. Please try again later.';
      }
      msg.className = 'status-msg error';
      msg.textContent = errText;
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-jp">サインイン</span><span class="btn-en">Sign In</span>';
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleSignIn();
  });
</script>

</body>
</html>
